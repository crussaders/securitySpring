version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:9
    container_name: flyway_migration
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mydb}
      - -user=${POSTGRES_USER:-admin}
      - -password=${POSTGRES_PASSWORD:-admin123}
      - migrate
    volumes:
      - ./db/migration:/flyway/sql
    networks:
      - db-network

  app:
    build:
      context: ../../..
      dockerfile: Dockerfile
    container_name: spring_app
    restart: always
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mydb}
      DB_USERNAME: ${POSTGRES_USER:-admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    ports:
      - "8080:8080"
    depends_on:
      flyway:
        condition: service_completed_successfully
    networks:
      - db-network

  pgadmin:
    image: dpage/pgadmin4:8.10
    container_name: pgadmin
    # Override PGADMIN_DEFAULT_EMAIL and PGADMIN_DEFAULT_PASSWORD in your .env file.
    # The defaults below are for local development only and must not be used in production.
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - db-network

volumes:
  postgres_data:

networks:
  db-network: